<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas 8.2 - Layout Box</title>
    <style>
        /* Container utama (Box Biru) */
        .container-biru {
            width: 400px;
            height: 350px;
            background-color: #add8e6; /* Light Blue */
            position: relative; /* Agar box merah bisa menempel di dalamnya */
            margin: 50px;
        }

        /* Box Merah di pojok kiri atas */
        .box-merah {
            width: 200px;
            height: 150px;
            background-color: #f08080; /* Light Coral / Reddish */
        }
    </style>
</head>
<body>

    <div class="container-biru">
        <div class="box-merah"></div>
    </div>

</body>
</html>
