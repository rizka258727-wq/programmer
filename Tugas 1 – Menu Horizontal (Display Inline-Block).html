<!DOCTYPE html>
<html>
<head>
<title>Menu Horizontal</title>
<style>
nav {
  background-color: #333;
  padding: 10px;
}
nav a {
  display: inline-block;
  color: white;
  background-color: #555;
  padding: 10px 20px;
  margin: 5px;
  text-decoration: none;
}
nav a:hover {
  background-color: #777;
}
</style>
</head>
<body>
<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Services</a>
  <a href="#">Portfolio</a>
  <a href="#">Contact</a>
</nav>
</body>
</html>
