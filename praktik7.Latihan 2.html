<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latihan 2 - Layout</title>
  <style>
    .header {
      width: 100%;
      height: 100px;
      background-color: lightblue;
      text-align: center;
      line-height: 100px;
      font-weight: bold;
    }
    .content {
      width: 100%;
      height: 300px;
      background-color: lightgreen;
      text-align: center;
      line-height: 300px;
    }
    .footer {
      width: 100%;
      height: 80px;
      background-color: coral;
      text-align: center;
      line-height: 80px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="header">Header (100px)</div>
  <div class="content">Content (300px)</div>
  <div class="footer">Footer (80px)</div>
</body>
</html>
