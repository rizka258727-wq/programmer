<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latihan 1 - Box</title>
  <style>
    .box1 {
      width: 200px;
      height: 200px;
      background-color: lightblue;
      border: 2px solid black;
      margin: 10px;
    }
    .box2 {
      width: 50%;
      height: 150px;
      background-color: lightgreen;
      border: 2px solid black;
      margin: 10px;
    }
    .box3 {
      width: 80vw;
      height: 30vh;
      background-color: coral;
      border: 2px solid black;
      margin: 10px;
    }
  </style>
</head>
<body>
  <div class="box1">Box 1: 200px x 200px</div>
  <div class="box2">Box 2: 50% x 150px</div>
  <div class="box3">Box 3: 80vw x 30vh</div>
</body>
</html>
