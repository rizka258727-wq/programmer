<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tugas 8.2</title>
  <style>
    .container {
      position: relative; /* supaya anak-anak bisa diatur posisinya */
      width: 400px;
      height: 300px;
      border: 1px solid #333;
    }

    .red-box {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 100px;
      height: 100px;
      background-color: pink;
    }

    .blue-box {
      position: absolute;
      top: 80px;   /* lebih rendah dari kotak merah */
      left: 80px;  /* bergeser ke kanan */
      width: 200px;
      height: 150px;
      background-color: lightblue;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="red-box"></div>
    <div class="blue-box"></div>
  </div>
</body>
</html>
